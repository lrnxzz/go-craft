version: "2"

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - copyloopvar
    - wastedassign
    - errorlint
    - nilerr
    - bodyclose
    - unconvert
    - unparam
    - gocritic
    - misspell
    - whitespace
    - nolintlint
    - revive
    - usestdlibvars
    - perfsprint

  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (io.Closer).Close
        - (*github.com/lrnxzz/go-craft.Reader).fail
    gocritic:
      enabled-tags:
        - diagnostic
        - style
      disabled-checks:
        - appendAssign
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: empty-block
        - name: error-naming
        - name: error-return
        - name: error-strings
        - name: errorf
        - name: increment-decrement
        - name: indent-error-flow
        - name: range
        - name: receiver-naming
        - name: redefines-builtin-id
        - name: superfluous-else
        - name: time-naming
        - name: unexported-return
        - name: unreachable-code
        - name: var-declaration
        - name: var-naming

  exclusions:
    rules:
      - path: (blocks/blocks|biomes/biomes)\.go
        linters:
          - all
      - path: _test\.go
        linters:
          - errcheck
          - unparam

formatters:
  enable:
    - gofmt
    - goimports
